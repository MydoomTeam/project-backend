version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: arenasync-postgres
    environment:
      POSTGRES_USER: arenasync
      POSTGRES_PASSWORD: arenasync
      POSTGRES_DB: arenasyncdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arenasync -d arenasyncdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
